app.password.length=10
app.seed-user-file=users.csv
app.seed-trainee-file=trainees.csv
app.seed-trainer-file=trainers.csv
app.seed-training-file=trainings.csv


spring.jpa.properties.hibernate.format_sql=true
spring.main.web-application-type=none

logging.level.root=INFO
logging.level.com.epam.gymcrm=DEBUG

logging.level.org.hibernate.SQL=off
logging.level.org.hibernate.orm.jdbc.bind=off


spring.datasource.url=jdbc:h2:file:./data/gymdb;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false