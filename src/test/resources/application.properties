
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

logging.level.root=WARN
logging.level.com.epam.gymcrm=WARN

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

app.jwt.secret=test-secret-key-test-secret-key-test-secret-key-test-secret-key



spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop

spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin
app.jms.trainer-workload-queue=trainer.workload.queue



app.security.max-attempts=3
app.security.lock-time-duration-minutes=5


app.jwt.expiration-ms=3600000

app.internal-jwt.secret=test-internal-secret-key-test-internal-secret-key-test-internal-secret-key
app.internal-jwt.expiration-ms=3600000
logging.level.org.springframework=WARN
logging.level.org.springframework.cloud=ERROR
logging.level.com.netflix.discovery=ERROR

spring.jpa.open-in-view=false

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

logging.level.org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker=ERROR
logging.level.org.springframework.boot.autoconfigure.orm.jpa.JpaBaseConfiguration$JpaWebConfiguration=ERROR
logging.level.org.springframework.web.servlet.mvc.support.DefaultHandlerExceptionResolver=ERROR